name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    name: Build and Test Rust Service
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Build Rust service
      working-directory: ./service
      run: cargo build --verbose
    
    - name: Run Rust tests
      working-directory: ./service
      run: cargo test --verbose
    
    - name: Check Rust formatting
      working-directory: ./service
      run: cargo fmt --check
    
    - name: Run Clippy
      working-directory: ./service
      run: cargo clippy -- -D warnings
    
    - name: Generate OpenAPI spec
      working-directory: ./service
      run: cargo run --bin generate-openapi

  bindings:
    name: Build TypeScript Bindings
    runs-on: ubuntu-latest
    needs: rust
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Generate OpenAPI spec
      working-directory: ./service
      run: |
        cargo build --release --bin generate-openapi
        cargo run --release --bin generate-openapi
        cp openapi.json ../openapi/
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: bindings/package-lock.json
    
    - name: Install bindings dependencies
      working-directory: ./bindings
      run: npm ci
    
    - name: Build bindings
      working-directory: ./bindings
      run: npm run build
    
    - name: Run bindings tests
      working-directory: ./bindings
      run: npm test

  frontend:
    name: Build and Test Angular Frontend
    runs-on: ubuntu-latest
    needs: bindings
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Generate OpenAPI spec
      working-directory: ./service
      run: |
        cargo build --release --bin generate-openapi
        cargo run --release --bin generate-openapi
        cp openapi.json ../openapi/
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Build bindings first
      working-directory: ./bindings
      run: |
        npm ci
        npm run build
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
    
    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test -- --watch=false --browsers=ChromeHeadless
