<div>
  <h1 class="mat-h1">Result {{ processId() }}</h1>
  <div class="grid-container">
    <mat-card class="dashboard-card">
      <mat-card-header>
        <mat-card-title>
          Inputs
          <!-- <button
              matIconButton
              class="more-button"
              [matMenuTriggerFor]="menu"
              aria-label="Toggle menu"
            >
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu" xPosition="before">
              <button mat-menu-item (click)="download()">Download</button>
            </mat-menu> -->
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <!-- TODO: Display the inputs of the selected process -->
        <em>This will display the inputs of the selected process.</em>
      </mat-card-content>
    </mat-card>

    <mat-card class="dashboard-card">
      <mat-card-header>
        <mat-card-title>
          Results
          <button
            matIconButton
            class="more-button"
            [matMenuTriggerFor]="menu"
            aria-label="Toggle menu"
          >
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu" xPosition="before">
            <button mat-menu-item (click)="download()">Download</button>
          </mat-menu>
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        @if (result.value().ndvi; as ndvi) {
          <p>NDVI:</p>
          <app-number-indicator
            [value]="ndvi"
            [min]="-1"
            [max]="1"
            [colors]="ndviColorMap"
          ></app-number-indicator>
        }
        @if (result.value().kNdvi; as kNdvi) {
          <p>kNDVI:</p>
          <app-number-indicator
            [value]="kNdvi"
            [min]="-1"
            [max]="1"
            [colors]="ndviColorMap"
          ></app-number-indicator>
        }
      </mat-card-content>
    </mat-card>
  </div>
</div>
